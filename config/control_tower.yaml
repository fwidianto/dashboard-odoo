version: "phase0-v3"
status: "PRE_IMPLEMENTATION_PLANNING_ONLY"

company_scope:
  company_id: 3
  display_name: "Nobi Putra Angkasa, PT"
  business_name: "PT Nobi Putra Angkasa"
  note: "Use company_id as the data-layer filter; names are presentation metadata."

protocol:
  sop_version: "draft-v2-baseline"
  rule_registry_version: "v2-validated-baseline"
  validation_version: "odoo18-final-2026-07-20"
  authority: "docs/09_Odoo18_Validation/SOP_SYSTEM_ALIGNMENT_MATRIX_FINAL.md"
  implementation_backlog: "docs/09_Odoo18_Validation/DASHBOARD_IMPLEMENTATION_BACKLOG_V2.md"
  implementation_authorized: false

business_start:
  stage: "CUSTOMER_PO_CONFIRMED_QUOTATION"
  confirmed_so_controls:
    effective_from: "2026-01-01"
    required_fields:
      - "client_order_ref"
      - "x_studio_tanggal_po_cust"
  technical_root_available: true
  technical_root: "sale.order"
  coverage_mode: "HYBRID"

root_types:
  - code: "SALES_ORDER"
    model: "sale.order"
    table: "sale_order"
    primary_key: "id"
    business_key: "name"
    role: "customer_flow_technical_root"
  - code: "INTERNAL_ORDER"
    model: "approval.request"
    table: "approval_request"
    primary_key: "id"
    business_key: "name"
    role: "internal_production_root"
  - code: "PURCHASE_ORDER"
    model: "purchase.order"
    table: "purchase_order"
    primary_key: "id"
    business_key: "name"
    role: "procurement_and_receipt_root"
  - code: "ACCOUNT_MOVE"
    model: "account.move"
    table: "account_move"
    primary_key: "id"
    business_key: "name"
    role: "invoice_and_receivable_root"

canonical_statuses:
  - "DRAFT"
  - "NOT_STARTED"
  - "WAITING"
  - "IN_PROGRESS"
  - "READY_RESERVED"
  - "PARTIAL_BACKORDER"
  - "BLOCKED"
  - "DONE_POSTED"
  - "CANCELLED"
  - "EXCEPTION"
  - "DATA_EXCEPTION"
  - "NOT_APPLICABLE"
  - "UNKNOWN"
  - "MANUAL"
  - "VALIDATION_PENDING"

coverage_modes:
  - "ODOO"
  - "DERIVED"
  - "HYBRID"
  - "MANUAL"
  - "RUNTIME_ONLY"

confidence_levels:
  - "HIGH"
  - "MEDIUM"
  - "LOW"
  - "MANUAL"

nodes:
  - id: "CT-00"
    name: "Customer PO / Confirmed Quotation"
    owner: "Marketing"
    readiness: "READY_FOR_DESIGN_MANUAL_EVIDENCE"
    coverage_mode: "HYBRID"
    root_applicability: ["SALES_ORDER"]
    entry_condition: "customer commitment exists"
    exit_condition: "SO created with required reference and date"
    counts_are_valid: true
    counts_scope: "confirmed SO from 2026 using required fields"

  - id: "CT-01"
    name: "Sales Order & Approval"
    owner: "Marketing / Admin Sales"
    approver: "VP Operations"
    readiness: "READY_FOR_DESIGN"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER"]
    entry_condition: "SO exists"
    exit_condition: "SO confirmed, cancelled, or retained Draft with approved reason"
    counts_are_valid: true

  - id: "CT-02"
    name: "Distribusi JO / Operational Handover"
    owner: "Marketing / Operations"
    readiness: "MANUAL"
    coverage_mode: "MANUAL"
    root_applicability: ["SALES_ORDER"]
    entry_condition: "business order information is available"
    exit_condition: "relevant internal parties receive the handover"
    sequencing: "independent_manual_milestone"
    may_occur_while_so_draft: true
    infer_from_so_state: false
    counts_are_valid: false

  - id: "CT-03"
    name: "Fulfilment Classification"
    owner: "Marketing / PPIC"
    readiness: "PARTIAL"
    coverage_mode: "DERIVED"
    root_applicability: ["SALES_ORDER"]
    classification_grain: "sale_order_line"
    header_rollup: true
    counts_are_valid: false
    blocked_by:
      - "direct_so_io_many_to_many_extraction"
      - "line_level_stock_and_mo_evidence_contract"

  - id: "CT-04"
    name: "Internal Order"
    owner: "PPIC"
    readiness: "PROVISIONAL"
    coverage_mode: "DERIVED"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER"]
    administrative_state_separate: true
    production_status_provisional: true
    utilization_status_provisional: true
    counts_are_valid: false

  - id: "CT-05"
    name: "Manufacturing Planning"
    owner: "PPIC"
    readiness: "PARTIAL"
    coverage_mode: "HYBRID"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER"]
    mo_suppression_code: "MO_SUPPRESSED_BY_IO"

  - id: "CT-06"
    name: "RKB / ROP Purchase Request"
    owner: "PPIC / Requester"
    readiness: "PARTIAL"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER"]
    rfq_creation_behavior: "custom_user_triggered_server_action"

  - id: "CT-07"
    name: "RFQ / Purchase Order"
    owner: "Procurement"
    approver: "PO Confirmed/Purchase state is operational approval"
    readiness: "READY_FOR_DESIGN_PARTIAL"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER", "PURCHASE_ORDER"]
    reset_is_correction: true

  - id: "CT-08"
    name: "Receipt & Inspection"
    owner: "WHD / Requester"
    readiness: "READY_FOR_DESIGN_HYBRID"
    coverage_mode: "HYBRID"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER", "PURCHASE_ORDER"]
    quality_module_used: false
    external_evidence_required: true

  - id: "CT-09"
    name: "Material Transfer / Pre-Production"
    owner: "PPIC / WHD"
    readiness: "PARTIAL"
    coverage_mode: "HYBRID"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER"]
    bon_is_consumption: false

  - id: "CT-10"
    name: "Production / Finish Good"
    owner: "PPIC / Production / WHD"
    readiness: "HYBRID"
    coverage_mode: "HYBRID"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER"]
    external_evidence_required: true
    legacy_locations_not_used:
      - "KRW/FG"
      - "FF5/FG"

  - id: "CT-11"
    name: "Delivery"
    owner: "WHD / Marketing"
    readiness: "READY_FOR_DESIGN_HYBRID"
    coverage_mode: "HYBRID"
    root_applicability: ["SALES_ORDER"]
    cancel_cascades_to_so: false

  - id: "CT-12"
    name: "Invoice"
    owner: "Accounting"
    readiness: "READY_FOR_DESIGN_PARTIAL"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER", "ACCOUNT_MOVE"]
    verify_final_state_after_action_error: true

  - id: "CT-13"
    name: "Payment / Collection"
    owner: "Accounting"
    readiness: "PROVISIONAL"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER", "ACCOUNT_MOVE"]
    counts_are_valid: false
    required_sources:
      - "posted_invoice"
      - "amount_residual"
      - "receivable_journal_items"
      - "partial_full_reconciliation"
      - "payment_entries"
      - "reversal_credit_note_adjustment_evidence"
    blocked_by:
      - "accounting_taxonomy_approval"

  - id: "CT-X1"
    name: "Correction / Reset / Cancellation Exposure"
    owner: "Dynamic process owner"
    readiness: "PARTIAL_RUNTIME_ONLY"
    coverage_mode: "RUNTIME_ONLY"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER", "PURCHASE_ORDER", "ACCOUNT_MOVE"]
    verify_final_state: true
    verify_downstream: true
    counts_are_valid: false

  - id: "CT-X2"
    name: "Exception Worklist"
    owner: "Data Health Owner"
    readiness: "READY_FOR_DESIGN"
    coverage_mode: "DERIVED"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER", "PURCHASE_ORDER", "ACCOUNT_MOVE"]
    counts_are_valid: true
    blocked_by:
      - "data_health_owner_and_cadence_approval"

source_classifications:
  - "FROM_STOCK"
  - "FROM_INTERNAL_ORDER"
  - "MAKE_TO_ORDER"
  - "MIXED_SOURCE"
  - "SOURCE_DATA_EXCEPTION"

io_production_statuses:
  - "NOT_STARTED"
  - "IN_PROGRESS"
  - "PARTIALLY_PRODUCED"
  - "FULLY_PRODUCED"
  - "OVER_PRODUCED"
  - "CANCELLED"
  - "DATA_EXCEPTION"

io_utilization_statuses:
  - "NOT_UTILIZED"
  - "PARTIALLY_UTILIZED"
  - "FULLY_UTILIZED"
  - "OVER_UTILIZED"
  - "DATA_EXCEPTION"

exception_vocabulary:
  - "MO_SUPPRESSED_BY_IO"
  - "MIXED_SOURCE"
  - "RESET_TO_DRAFT_WITH_OPEN_DOWNSTREAM"
  - "RESET_TO_DRAFT_WITH_OPEN_RECEIPT"
  - "RESET_TO_DRAFT_WITH_DRAFT_VENDOR_BILL"
  - "CANCEL_BLOCKED_OR_FAILED"
  - "ACTION_APPLIED_WITH_RPC_ERROR"
  - "CANCELED_PARENT_WITH_OPEN_DOWNSTREAM"
  - "CANCELED_PARENT_WITH_DONE_DOWNSTREAM"
  - "CANCELED_PARENT_WITH_RESERVED_STOCK"
  - "CANCELED_PARENT_WITH_PARTIAL_BACKORDER"
  - "CANCELLED_PO_WITH_OPEN_RECEIPT"
  - "CANCELLED_SO_WITH_ACTIVE_DOWNSTREAM"
  - "IO_PRODUCTION_DATA_EXCEPTION"
  - "IO_UTILIZATION_DATA_EXCEPTION"
  - "AUTOMATION_EFFECT_UNCONFIRMED"

approval_overlays:
  - code: "SO_APPROVAL"
    node_id: "CT-01"
  - code: "ROP_APPROVAL"
    node_id: "CT-06"
  - code: "PO_CONFIRM_APPROVAL"
    node_id: "CT-07"
  - code: "CORRECTION_APPROVAL"
    node_id: "CT-X1"
  - code: "EXCEPTION_APPROVAL"
    node_id: "DYNAMIC_AFFECTED_NODE"

current_gate:
  required_decisions:
    - "data_health_owner_and_review_cadence"
    - "structured_log_note_and_reason_codes"
    - "accounting_payment_taxonomy"
    - "io_product_uom_and_multi_io_allocation"
    - "parent_child_mo_relation"
    - "cancellation_replacement_procedures"
  next_implementation_phase: "NATIVE_RELATION_EXTRACTION"

deferred_features:
  - "formal_ticketing"
  - "ai_sop_change_proposal_automation"
  - "dashboard_writeback_to_odoo"
  - "production_odoo_configuration_changes"

api_contracts:
  process_map: "/api/control-tower/process-map"
  node_records: "/api/control-tower/nodes/{node_id}/records"
  journey: "/api/control-tower/journey/{root_model}/{root_id}"
  exceptions: "/api/control-tower/exceptions"
  rule: "/api/control-tower/rules/{rule_id}"

required_output_fields:
  - "root_model"
  - "root_id"
  - "related_model"
  - "related_id"
  - "node_id"
  - "native_status"
  - "canonical_status"
  - "operational_status"
  - "status_reason"
  - "owner"
  - "coverage_mode"
  - "data_confidence"
  - "age_days"
  - "open_exception_count"
  - "highest_severity"
  - "evidence_required"
  - "source_updated_at"
  - "rule_version"
  - "sop_version"
