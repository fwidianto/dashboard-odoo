version: "phase0-v2"
company_scope:
  display_name: "Nobi Putra Angkasa, PT"
  business_name: "PT Nobi Putra Angkasa"

protocol:
  sop_version: "draft-v4"
  rule_registry_version: "v1-draft-v2"
  validation_version: "phase0-v2"
  current_focus: "PROCESS_AND_SOP_DASHBOARD_VALIDATION"

business_start:
  stage: "CUSTOMER_PO_CONFIRMED_QUOTATION"
  assumptions:
    - "quotation_confirmed_by_customer"
    - "customer_po_available"
  technical_root_available: false
  coverage_mode: "MANUAL"

root_types:
  - code: "SALES_ORDER"
    model: "sale.order"
    table: "sale_order"
    primary_key: "id"
    business_key: "name"
    role: "customer_flow_technical_root"
  - code: "INTERNAL_ORDER"
    model: "approval.request"
    table: "approval_request"
    primary_key: "id"
    business_key: "name"
    role: "internal_production_root"

canonical_statuses:
  - "NOT_STARTED"
  - "WAITING"
  - "IN_PROGRESS"
  - "BLOCKED"
  - "PARTIAL"
  - "COMPLETED"
  - "EXCEPTION"
  - "NOT_APPLICABLE"
  - "CANCELLED"
  - "UNKNOWN"
  - "MANUAL"
  - "MAPPING_PENDING"
  - "VALIDATION_PENDING"

status_precedence:
  - "EXCEPTION"
  - "BLOCKED"
  - "CANCELLED"
  - "PARTIAL"
  - "IN_PROGRESS"
  - "WAITING"
  - "VALIDATION_PENDING"
  - "MAPPING_PENDING"
  - "MANUAL"
  - "NOT_STARTED"
  - "COMPLETED"
  - "NOT_APPLICABLE"
  - "UNKNOWN"

coverage_modes:
  - "ODOO"
  - "HYBRID"
  - "MANUAL"
  - "PENDING_MAPPING"

confidence_levels:
  - "HIGH"
  - "MEDIUM"
  - "LOW"
  - "MANUAL"

nodes:
  - id: "CT-00"
    name: "Customer PO / Confirmed Quotation"
    owner: "Marketing"
    readiness: "MANUAL"
    coverage_mode: "MANUAL"
    root_applicability: ["SALES_ORDER"]
    sop_reference: "SOP 3.1 / Business Start"
    entry_condition: "quotation confirmed by customer and customer PO available"
    exit_condition: "Sales Order created from the approved customer basis"
    counts_are_valid: false
  - id: "CT-01"
    name: "Sales Order & Approval"
    owner: "Marketing / Admin Sales"
    approver: "According to approved SO authority"
    readiness: "PARTIAL"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER"]
    sop_reference: "SOP 3.1"
    entry_condition: "customer order basis available and SO created"
    exit_condition: "SO approved/confirmed or cancelled"
    counts_are_valid: true
  - id: "CT-02"
    name: "Distribusi JO / Operational Handover"
    owner: "Marketing / Admin Sales"
    readiness: "MANUAL"
    coverage_mode: "MANUAL"
    future_coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER"]
    sop_reference: "SOP 3.1 / Distribusi JO"
    entry_condition: "SO approved/confirmed"
    exit_condition: "order information distributed to relevant functions"
    counts_are_valid: false
  - id: "CT-03"
    name: "Fulfilment Decision"
    owner: "Marketing / PPIC"
    readiness: "PARTIAL"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER"]
    sop_reference: "SOP 3.1-3.2"
  - id: "CT-04"
    name: "Internal Order / Stock Fulfilment"
    owner: "PPIC"
    readiness: "READY"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER"]
    sop_reference: "SOP 3.1-3.2"
  - id: "CT-05"
    name: "Manufacturing Planning"
    owner: "PPIC"
    readiness: "PARTIAL"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER"]
    sop_reference: "SOP 3.2"
  - id: "CT-06"
    name: "RKB / ROP Purchase Request"
    owner: "PPIC / Requester"
    approver: "Assistant VP then VP Operations"
    readiness: "PARTIAL"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER"]
    sop_reference: "SOP 3.3"
  - id: "CT-07"
    name: "RFQ / Purchase Order"
    owner: "Procurement"
    approver: "Assistant VP review / VP Operations confirm"
    readiness: "PARTIAL"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER"]
    sop_reference: "SOP 3.4"
  - id: "CT-08"
    name: "Receipt & Inspection"
    owner: "WHD / Gudang"
    readiness: "PARTIAL"
    coverage_mode: "HYBRID"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER"]
    sop_reference: "SOP 3.5"
  - id: "CT-09"
    name: "Material Transfer / Pre-Production"
    owner: "PPIC / WHD"
    readiness: "PARTIAL"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER"]
    sop_reference: "SOP 3.6"
  - id: "CT-10"
    name: "Production / Finish Good"
    owner: "PPIC / Produksi / WHD"
    readiness: "PARTIAL"
    coverage_mode: "HYBRID"
    root_applicability: ["SALES_ORDER", "INTERNAL_ORDER"]
    sop_reference: "SOP 3.6"
    operational_evidence_required: true
    note: "not all production users/processes currently use Odoo"
  - id: "CT-11"
    name: "Delivery"
    owner: "Marketing / WHD"
    readiness: "PARTIAL"
    coverage_mode: "HYBRID"
    root_applicability: ["SALES_ORDER"]
    sop_reference: "SOP 3.7"
  - id: "CT-12"
    name: "Invoice"
    owner: "Accounting"
    readiness: "PARTIAL"
    coverage_mode: "ODOO"
    root_applicability: ["SALES_ORDER"]
    sop_reference: "Case 4.5"
  - id: "CT-13"
    name: "Payment / Collection"
    owner: "Accounting"
    readiness: "INVESTIGATION"
    coverage_mode: "PENDING_MAPPING"
    root_applicability: ["SALES_ORDER"]
    sop_reference: "Accounting SOP Pending"
    counts_are_valid: false
    validation_sources:
      - "payment_record"
      - "invoice_residual_receivable"
      - "account_receivable_reconciliation"
    validation_rule: "compare all sources before selecting source of truth"

approval_overlays:
  - code: "SO_APPROVAL"
    node_id: "CT-01"
  - code: "ROP_APPROVAL"
    node_id: "CT-06"
  - code: "PO_REVIEW_CONFIRM"
    node_id: "CT-07"
  - code: "LOCK_UNLOCK_APPROVAL"
    node_id: "DYNAMIC_AFFECTED_NODE"
  - code: "EXCEPTION_APPROVAL"
    node_id: "DYNAMIC_AFFECTED_NODE"

source_classifications:
  - "FROM_STOCK"
  - "FROM_INTERNAL_ORDER"
  - "MAKE_TO_ORDER"
  - "MIXED_SOURCE"
  - "UNKNOWN_SOURCE"

current_validation_scope:
  - "customer_po_to_sales_order"
  - "sales_order_approval_to_distribusi_jo"
  - "fulfilment_source_branches"
  - "manufacturing_procurement_receipt_wip_links"
  - "production_odoo_manual_coverage"
  - "delivery_to_invoice"
  - "payment_vs_receivable_reconciliation"
  - "sop_rule_vs_dashboard_output"

deferred_features:
  - "formal_ticketing"
  - "ai_sop_change_proposal_automation"
  - "dashboard_writeback_to_odoo"

api_contracts:
  process_map: "/api/control-tower/process-map"
  node_records: "/api/control-tower/nodes/{node_id}/records"
  journey: "/api/control-tower/journey/{root_type}/{root_id}"
  rule: "/api/control-tower/rules/{rule_id}"

required_output_fields:
  - "root_type"
  - "root_id"
  - "node_id"
  - "native_status"
  - "canonical_status"
  - "operational_status"
  - "status_reason"
  - "owner"
  - "approver"
  - "coverage_mode"
  - "data_confidence"
  - "mapping_status"
  - "age_days"
  - "open_exception_count"
  - "highest_severity"
  - "last_activity_at"
  - "source_updated_at"
  - "rule_version"
  - "validation_version"