# Odoo to PostgreSQL Synchronization Configuration
# Supports simple format - just list Odoo field names!

# Global settings
default_batch_size: 1000
max_retries: 3
retry_delay_seconds: 5
default_deletion_strategy: ignore  # Options: ignore, soft_delete, reconcile

models:
  # ============================================================
  # SIMPLE FORMAT - Just list field names!
  # ============================================================
  # Auto-detects:
  #   - id field → primary_key=True, type=INTEGER
  #   - *_id fields → is_foreign_key=True, type=INTEGER
  #   - write_date/create_date → is_sync_date=True, type=TIMESTAMP
  #   - active/is_active → type=BOOLEAN
  #   - other fields → type=TEXT (schema migration will fix types)
  # ============================================================
  
  - odoo_model: res.partner
    postgres_table: res_partner
    description: "Contacts/Partners"
    fields:
      - id
      - name
      - active
      - email
      - phone
      - partner_id  # Auto-detected as foreign key
      - write_date   # Auto-detected as sync date

  - odoo_model: product.product
    postgres_table: product_product
    description: "Products"
    fields:
      - id
      - name
      - default_code
      - active
      - list_price
      - standard_price
      - qty_available
      - product_tmpl_id
      - write_date

  # ============================================================
  # OVERRIDE FORMAT - Add specific options
  # ============================================================
  # Use dict format to override auto-detected values
  
  - odoo_model: sale.order
    postgres_table: sale_order
    description: "Sale Orders"
    fields:
      - id
      - name
      - partner_id
        indexed: true  # Add index for foreign key
      - date_order
      - state
        indexed: true
      - amount_total
      - write_date

  # ============================================================
  # VERBOSE FORMAT - Full control (backward compatible)
  # ============================================================
  # Use this when you need precise control over column names/types

  - odoo_model: stock.move
    postgres_table: stock_move
    description: "Stock Moves"
    fields:
      - odoo_field: id
        postgres_column: id
        postgres_type: INTEGER
        primary_key: true
        nullable: false
        indexed: true
        
      - odoo_field: name
        postgres_column: name
        postgres_type: TEXT
        
      - odoo_field: product_id
        postgres_column: product_id
        postgres_type: INTEGER
        is_foreign_key: true
        indexed: true
        field_type: many2one
        related_model: product.product
        
      - odoo_field: product_qty
        postgres_column: product_qty
        postgres_type: NUMERIC(20,4)  # Large values for Odoo
        
      - odoo_field: state
        postgres_column: state
        postgres_type: VARCHAR(32)
        indexed: true
        
      - odoo_field: date
        postgres_column: move_date
        postgres_type: TIMESTAMP
        indexed: true
        
      - odoo_field: write_date
        postgres_column: write_date
        postgres_type: TIMESTAMP
        is_sync_date: true
        indexed: true

# ============================================================
# Type Auto-Detection Reference
# ============================================================
# Field Name Pattern      → PostgreSQL Type
# --------------------      --------------------
# id                      → INTEGER (primary key)
# *_id                    → INTEGER (foreign key)
# active, is_active       → BOOLEAN
# write_date, create_date → TIMESTAMP (sync date)
# date                    → TIMESTAMP
# name, email, etc.       → TEXT (VARCHAR 255+)

# ============================================================
# Deletion Strategies
# ============================================================
# ignore       → Do nothing with deleted records
# soft_delete → Mark records as inactive (active=false)
# reconcile   → Remove records from PostgreSQL
