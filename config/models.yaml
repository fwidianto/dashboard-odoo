# =============================================================================
# MODEL WITH OPTIONS
# =============================================================================
# Use this format when you need custom table names or deletion strategies.
# All fields are STILL auto-detected from Odoo - just add options you need.

models_with_options:
  # Example: Custom table name (uncomment to use)
  # - odoo_model: some.model
  #   postgres_table: custom_table_name
  #   description: "Custom description"

  # Example: Soft delete (uncomment to use)
  # - odoo_model: res.partner
  #   deletion_strategy: soft_delete
  #   soft_delete_field: active

  # Example: Exclude large fields (uncomment to use)
  # - odoo_model: product.product
  #   exclusions:
  #     - image_1920
  #     - image_1024

  # Example: Include only specific fields (uncomment to use)
  # - odoo_model: stock.move
  #   inclusions:
  #     - id
  #     - name
  #     - product_id
  #     - write_date

# =============================================================================
# LEGACY FORMAT (Still Supported)
# =============================================================================
# If you need explicit field control, use the legacy format.
# Even in legacy format, fields are validated against Odoo's actual schema.

legacy_models:
  # Example (uncomment to use):
  # - odoo_model: some.model
  #   postgres_table: custom_table
  #   fields:
  #     - id
  #     - name
  #     - write_date

# =============================================================================
# FIELD TYPE MAPPING (Auto-applied)
# =============================================================================
# Odoo Type        → PostgreSQL Type      Notes
# ---------------    -------------------   ------------------
# integer          → INTEGER              Standard integers
# bigint            → BIGINT               Large integers
# float            → NUMERIC(20,4)        Float/monetary values
# monetary          → NUMERIC(20,4)        Currency fields
# boolean           → BOOLEAN              True/False fields
# char              → TEXT                 Odoo char can be long
# text              → TEXT                 Multi-line text
# selection         → VARCHAR(64)          Dropdown values
# date              → DATE                 Date fields
# datetime          → TIMESTAMP             Date+time fields
# many2one          → INTEGER              Related record ID
# binary             → BYTEA                Binary data (skipped by default)
# html               → TEXT                 HTML content
# reference         → VARCHAR(255)         Dynamic references
# one2many          → (SKIPPED)            Not stored directly
# many2many         → (SKIPPED)            Not stored directly

# =============================================================================
# CUSTOM FIELDS (x_*)
# =============================================================================
# Custom fields are automatically detected and synced!
# Just add the model to the list and all x_* fields will be included.
#
# Example: A custom field x_customer_type on res.partner will be:
#   - Detected automatically
#   - Added as x_customer_type TEXT column
#   - Synced with all other fields

# =============================================================================
# DELETION STRATEGIES
# =============================================================================
# ignore       → Do nothing (default)
#               Records deleted in Odoo remain in PostgreSQL
#
# soft_delete  → Set active=false
#               Records are marked inactive, not deleted
#               Requires soft_delete_field to be configured
#
# reconcile    → Delete from PostgreSQL
#               Records deleted in Odoo are also deleted from PostgreSQL
#               Use with caution!
