# =============================================================================
# Odoo to PostgreSQL Synchronization Configuration
# =============================================================================
#
# NEW MODEL-BASED ARCHITECTURE:
# =============================
# YAML now only contains model names. ALL fields are automatically
# discovered from Odoo's fields_get() API at runtime.
#
# Simply add any Odoo model and it will be fully synchronized!
#
# =============================================================================

# Global settings
default_batch_size: 1000
max_retries: 3
retry_delay_seconds: 5
default_deletion_strategy: ignore  # Options: ignore, soft_delete, reconcile

models:
  # ===========================================================================
  # MODEL-ONLY FORMAT (Recommended)
  # ===========================================================================
  # Just list model names! All fields are auto-detected from Odoo.
  # The table name is auto-generated from the model name (sale.order → sale_order)
  #
  # Auto-discovered for every field:
  #   - id → PRIMARY KEY, INTEGER
  #   - write_date, create_date → indexed, TIMESTAMP
  #   - many2one fields (*_id) → INTEGER, indexed
  #   - Odoo field types → PostgreSQL types
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # CORE MODELS
  # ---------------------------------------------------------------------------
  - res.partner                    # Contacts/Partners
  - product.template               # Product Templates
  - product.product                 # Product Variants
  
  # ---------------------------------------------------------------------------
  # SALES MODELS
  # ---------------------------------------------------------------------------
  - sale.order                     # Sale Orders
  - sale.order.line               # Sale Order Lines
  
  # ---------------------------------------------------------------------------
  # PURCHASE MODELS
  # ---------------------------------------------------------------------------
  - purchase.order                 # Purchase Orders
  - purchase.order.line           # Purchase Order Lines
  
  # ---------------------------------------------------------------------------
  # ACCOUNTING MODELS
  # ---------------------------------------------------------------------------
  - account.move                   # Journal Entries
  - account.move.line             # Journal Entry Lines
  - account.payment               # Payments
  
  # ---------------------------------------------------------------------------
  # STOCK MODELS
  # ---------------------------------------------------------------------------
  - stock.move                     # Stock Moves
  - stock.move.line               # Stock Move Lines
  - stock.quant                   # Stock Quants
  
  # ---------------------------------------------------------------------------
  # MANUFACTURING MODELS
  # ---------------------------------------------------------------------------
  - mrp.production                # Manufacturing Orders
  
  # ---------------------------------------------------------------------------
  # APPROVAL MODELS
  # ---------------------------------------------------------------------------
  - approval.request              # Approval Requests
  - approval.product.line         # Approval Product Lines

# =============================================================================
# MODEL WITH OPTIONS
# =============================================================================
# Use this format when you need custom table names or deletion strategies.
# All fields are STILL auto-detected from Odoo - just add options you need.

models_with_options:
  # Example: Custom table name
  - odoo_model: sale.order
    postgres_table: my_sale_orders
    description: "Custom sale orders table"

  # Example: Soft delete for partners
  - odoo_model: res.partner
    postgres_table: res_partner
    deletion_strategy: soft_delete
    soft_delete_field: active
    description: "Partners with soft delete"

  # Example: Exclude specific fields
  - odoo_model: product.product
    postgres_table: product_product
    exclusions:
      - image_1920      # Skip large binary field
      - image_1024      # Skip large binary field
    description: "Products without images"

  # Example: Include only specific fields
  - odoo_model: stock.move
    postgres_table: stock_move_basic
    inclusions:
      - id
      - name
      - product_id
      - product_qty
      - state
      - date
      - write_date
    description: "Basic stock move fields only"

# =============================================================================
# LEGACY FORMAT (Still Supported)
# =============================================================================
# If you need explicit field control, use the legacy format.
# Even in legacy format, fields are validated against Odoo's actual schema.

legacy_models:
  - odoo_model: stock.move
    postgres_table: stock_move
    description: "Stock Moves with custom configuration"
    fields:
      - id
      - name
      - product_id
        indexed: true
      - product_qty
      - state
        indexed: true
      - date
        indexed: true
      - write_date
        is_sync_date: true

# =============================================================================
# FIELD TYPE MAPPING (Auto-applied)
# =============================================================================
# Odoo Type        → PostgreSQL Type      Notes
# ---------------    -------------------   ------------------
# integer          → INTEGER              Standard integers
# bigint            → BIGINT               Large integers
# float            → NUMERIC(20,4)        Float/monetary values
# monetary          → NUMERIC(20,4)        Currency fields
# boolean           → BOOLEAN              True/False fields
# char              → TEXT                 Odoo char can be long
# text              → TEXT                 Multi-line text
# selection         → VARCHAR(64)          Dropdown values
# date              → DATE                 Date fields
# datetime          → TIMESTAMP             Date+time fields
# many2one          → INTEGER              Related record ID
# binary             → BYTEA                Binary data (skipped by default)
# html               → TEXT                 HTML content
# reference         → VARCHAR(255)         Dynamic references
# one2many          → (SKIPPED)            Not stored directly
# many2many         → (SKIPPED)            Not stored directly

# =============================================================================
# CUSTOM FIELDS (x_*)
# =============================================================================
# Custom fields are automatically detected and synced!
# Just add the model to the list and all x_* fields will be included.
#
# Example: A custom field x_customer_type on res.partner will be:
#   - Detected automatically
#   - Added as x_customer_type TEXT column
#   - Synced with all other fields

# =============================================================================
# DELETION STRATEGIES
# =============================================================================
# ignore       → Do nothing (default)
#               Records deleted in Odoo remain in PostgreSQL
#
# soft_delete  → Set active=false
#               Records are marked inactive, not deleted
#               Requires soft_delete_field to be configured
#
# reconcile    → Delete from PostgreSQL
#               Records deleted in Odoo are also deleted from PostgreSQL
#               Use with caution!
