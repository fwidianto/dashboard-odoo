# =============================================================================
# Odoo to PostgreSQL Synchronization Configuration
# =============================================================================
#
# MODEL-BASED CONFIGURATION WITH EXPLICIT COLUMNS:
# ===============================================
# Each model defines its own columns with:
#   - Technical name (Odoo field name)
#   - Display name (for reports/headers)
#   - Type (auto-detected)
#
# =============================================================================

# Global settings
default_batch_size: 1000
max_retries: 3
retry_delay_seconds: 5
default_deletion_strategy: ignore

models:
